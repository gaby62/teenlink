<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeenLink</title>
  <meta name="theme-color" content="#5b8a72">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TeenLink">
  <meta name="description" content="TeenLink - Réseau social pour les 13-18 ans">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #5b8a72;
      --primary-light: #7aab94;
      --primary-dark: #3d6b54;
      --secondary: #c4856a;
      --accent: #d4a574;
      --bg: #faf8f5;
      --card: #ffffff;
      --text: #2d3436;
      --text-secondary: #636e72;
      --border: #e8e4df;
      --glow: rgba(91, 138, 114, 0.3);
    }
    body { margin: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.4s ease, color 0.4s ease; }
    body.dark { background: #1a2418; color: #e0ddd8; }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    .page-slide { animation: pageSlide 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pageSlide { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes popIn { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes borderGlow { 0%,100% { border-color: var(--primary); } 50% { border-color: var(--accent); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .pop-in { animation: popIn 0.25s ease-out; }
    .bounce { animation: bounce 0.4s ease; }
    .chat-scroll { scroll-behavior: smooth; }
    .chat-scroll::-webkit-scrollbar { width: 5px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }

    /* === DARK MODE === */
    body.dark { background: #1a2418; color: #e0ddd8; }
    .dark .bg-white { background: #243029 !important; }
    .dark .bg-gray-50, .dark .bg-gray-100 { background: #1e2b22 !important; }
    .dark .bg-gray-200 { background: #2d3e33 !important; }
    .dark .text-gray-800, .dark .text-gray-700, .dark .text-gray-600 { color: #e0ddd8 !important; }
    .dark .text-gray-500, .dark .text-gray-400 { color: #9aa89e !important; }
    .dark .border { border-color: #3a4a3f !important; }
    .dark .border-gray-200, .dark .border-gray-300 { border-color: #3a4a3f !important; }
    .dark nav { background: #1e2b22 !important; }
    .dark input, .dark select, .dark textarea { background: #1e2b22 !important; color: #e0ddd8 !important; border-color: #3a4a3f !important; }

    /* === NAVBAR === */
    nav.naturel-nav {
      background: linear-gradient(135deg, #5b8a72 0%, #7aab94 50%, #c4856a 100%);
      box-shadow: 0 4px 20px rgba(91, 138, 114, 0.25);
    }
    .dark nav.naturel-nav {
      background: linear-gradient(135deg, #1e2b22 0%, #2d3e33 50%, #3a4a3f 100%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    nav .logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      letter-spacing: -0.5px;
    }

    /* === DRAWER GLASSMORPHISM === */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(26, 36, 24, 0.5); backdrop-filter: blur(4px); z-index: 90; animation: fadeIn 0.2s; }
    .drawer { position: fixed; left: 0; top: 0; bottom: 0; width: 290px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); box-shadow: 4px 0 30px rgba(0,0,0,0.12); overflow-y: auto; border-right: 1px solid rgba(91, 138, 114, 0.15); }
    .drawer.open { transform: translateX(0); }
    .dark .drawer { background: rgba(30, 43, 34, 0.92); border-right-color: rgba(91, 138, 114, 0.2); }
    .drawer-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 0.9rem; font-weight: 500; border-radius: 0 16px 16px 0; margin-right: 8px; cursor: pointer; transition: all 0.2s ease; }
    .drawer-item:hover { background: rgba(91, 138, 114, 0.08); }
    .drawer-item.active { background: linear-gradient(90deg, rgba(91,138,114,0.15), rgba(196,133,106,0.08)); color: var(--primary-dark); font-weight: 600; border-left: 3px solid var(--primary); }
    .dark .drawer-item:hover { background: rgba(91, 138, 114, 0.12); }
    .dark .drawer-item.active { background: linear-gradient(90deg, rgba(91,138,114,0.2), rgba(196,133,106,0.1)); color: var(--primary-light); }

    /* === CARDS NATURE === */
    .card-nature {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(91, 138, 114, 0.08);
      border: 1px solid rgba(91, 138, 114, 0.1);
      transition: all 0.3s ease;
    }
    .card-nature:hover {
      box-shadow: 0 8px 30px rgba(91, 138, 114, 0.15);
      border-color: rgba(91, 138, 114, 0.2);
      transform: translateY(-2px);
    }
    .dark .card-nature { background: #243029; border-color: rgba(91, 138, 114, 0.15); }
    .dark .card-nature:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

    /* === BOUTONS NATURE === */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(91, 138, 114, 0.3);
      transition: all 0.25s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91, 138, 114, 0.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary), #d4956a);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(196, 133, 106, 0.3);
      transition: all 0.25s ease;
    }
    .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196, 133, 106, 0.4); }

    /* === AVATAR GLOW === */
    .avatar-glow {
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(91, 138, 114, 0.2), 0 4px 12px rgba(0,0,0,0.1);
      transition: box-shadow 0.3s ease;
    }
    .avatar-glow:hover { box-shadow: 0 0 0 3px rgba(91, 138, 114, 0.4), 0 4px 20px rgba(91, 138, 114, 0.3); }

    /* === ONLINE DOT === */
    .online-dot { width: 11px; height: 11px; background: #4caf50; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; box-shadow: 0 0 6px rgba(76, 175, 80, 0.5); }
    .dark .online-dot { border-color: #243029; }

    /* === BADGES === */
    .badge-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 9999px;
      font-size: 0.7rem; font-weight: 600;
      background: linear-gradient(135deg, rgba(91,138,114,0.1), rgba(196,133,106,0.1));
      border: 1px solid rgba(91,138,114,0.15);
    }

    /* === INPUTS === */
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="tel"], select, textarea {
      border-radius: 12px;
      border: 1.5px solid var(--border);
      transition: all 0.25s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91, 138, 114, 0.15);
      outline: none;
    }

    /* === STATUS DOTS === */
    .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; display: inline-block; flex-shrink: 0; }
    .status-available { background: #4caf50; box-shadow: 0 0 6px rgba(76, 175, 80, 0.4); }
    .status-busy { background: #e74c3c; box-shadow: 0 0 6px rgba(231, 76, 60, 0.4); }
    .status-studying { background: #f39c12; box-shadow: 0 0 6px rgba(243, 156, 18, 0.4); }
    .status-away { background: #95a5a6; }
    .status-invisible { background: #7f8c8d; }

    /* === VOICE RECORDING === */
    .voice-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 0.2s; }
    .voice-recording { background: #e74c3c; animation: pulse 1s infinite; box-shadow: 0 0 20px rgba(231, 76, 60, 0.4); }

    /* === COMPAT RING === */
    .compat-ring { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; background: linear-gradient(135deg, rgba(91,138,114,0.1), rgba(212,165,116,0.1)); }

    /* === EMOJI PICKER === */
    .emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; max-height: 200px; overflow-y: auto; }
    .emoji-btn { font-size: 1.4rem; padding: 4px; cursor: pointer; border-radius: 8px; text-align: center; border: none; background: none; transition: all 0.15s; }
    .emoji-btn:hover { background: rgba(91, 138, 114, 0.1); transform: scale(1.2); }

    /* === HEADER PROFILE === */
    .profile-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 40%, var(--secondary) 100%);
      border-radius: 16px 16px 0 0;
    }
    .dark .profile-header {
      background: linear-gradient(135deg, #2d3e33 0%, #3a4a3f 50%, #4a3a35 100%);
    }

    /* === MODAL GLASS === */
    .modal-glass {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(91, 138, 114, 0.15);
    }
    .dark .modal-glass { background: rgba(30, 43, 34, 0.95); }

    /* === XP BAR === */
    .xp-bar { height: 6px; border-radius: 10px; background: rgba(91, 138, 114, 0.15); overflow: hidden; }
    .xp-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.5s ease; }

    @media (orientation: landscape) and (max-height: 500px) {
      body { font-size: 14px; }
      .max-w-xl, .max-w-3xl, .max-w-4xl { max-width: 100% !important; padding-left: 8px !important; padding-right: 8px !important; }
      .flex.flex-col.h-screen { height: auto !important; min-height: 100vh; }
      .page-slide { padding-top: 4px !important; }
      .drawer { width: 240px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext, useCallback } = React;

    // === THEME CONTEXT (#3) ===
    const ThemeContext = createContext(null);
    function ThemeProvider({ children }) {
      const [dark, setDark] = useState(() => localStorage.getItem('theme') === 'dark');
      useEffect(() => { localStorage.setItem('theme', dark ? 'dark' : 'light'); document.body.className = dark ? 'dark' : ''; }, [dark]);
      return <ThemeContext.Provider value={{ dark, toggle: () => setDark(d => !d) }}>{children}</ThemeContext.Provider>;
    }
    const useTheme = () => useContext(ThemeContext);

    // === API ===
    const API = '/api';
    const getToken = () => localStorage.getItem('token');
    const headers = (json = true) => {
      const h = { Authorization: `Bearer ${getToken()}` };
      if (json) h['Content-Type'] = 'application/json';
      return h;
    };
    const api = {
      get: async (path) => { const r = await fetch(`${API}${path}`, { headers: headers(false) }); if (!r.ok) throw new Error((await r.json()).message); return r.json(); },
      post: async (path, body) => { const r = await fetch(`${API}${path}`, { method: 'POST', headers: headers(), body: JSON.stringify(body) }); if (!r.ok) throw new Error((await r.json()).message); return r.json(); },
      put: async (path, body) => { const r = await fetch(`${API}${path}`, { method: 'PUT', headers: headers(), body: body ? JSON.stringify(body) : undefined }); if (!r.ok) throw new Error((await r.json()).message); return r.json(); },
      del: async (path) => { const r = await fetch(`${API}${path}`, { method: 'DELETE', headers: headers(false) }); if (!r.ok) throw new Error((await r.json()).message); return r.json(); },
    };

    // === CONTEXT ===
    const AuthContext = createContext(null);
    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        if (getToken()) api.get('/users/me').then(setUser).catch(() => localStorage.removeItem('token')).finally(() => setLoading(false));
        else setLoading(false);
      }, []);
      useEffect(() => {
        if (!user) return;
        const heartbeat = () => api.post('/heartbeat').catch(()=>{});
        heartbeat();
        const i = setInterval(heartbeat, 30000);
        return () => clearInterval(i);
      }, [user]);
      const login = async (email, password) => { const d = await api.post('/auth/login', { email, password }); localStorage.setItem('token', d.token); setUser(d.user); return d; };
      const register = async (data) => { const d = await api.post('/auth/register', data); localStorage.setItem('token', d.token); setUser(d.user); return d; };
      const logout = () => { localStorage.removeItem('token'); setUser(null); };
      const updateUser = async (updates) => { const u = await api.put('/users/me', updates); setUser(u); return u; };
      return <AuthContext.Provider value={{ user, loading, login, register, logout, updateUser }}>{children}</AuthContext.Provider>;
    }
    const useAuth = () => useContext(AuthContext);

    // === ROUTER (simple hash) ===
    function useRoute() {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/messages');
      useEffect(() => { const h = () => setPath(window.location.hash.slice(1) || '/messages'); window.addEventListener('hashchange', h); return () => window.removeEventListener('hashchange', h); }, []);
      const navigate = (p) => { window.location.hash = p; };
      return { path, navigate };
    }

    // === CONSTANTS ===
    const HAIR = ['noir','brun','roux','blond','gris','blanc','autre'];
    const SKIN = ['claire','mate','foncée','noire','autre'];
    const EYES = ['bruns','bleus','verts','noisette','gris','autre'];
    const INTERESTS = ['Musique','Sport','Jeux vidéo','Lecture','Cinéma','Art','Cuisine','Voyage','Nature','Mode','Photo','Danse','Théâtre','Sciences','Informatique','Animaux'];
    const EMOJIS = ['😀','😂','😍','🥰','😎','🤔','😢','😡','👍','👋','🔥','❤️','💪','🎉','🎵','⚽','🎮','📚','🍕','🌈','⭐','💫','🌸','🐱','🐶','✈️','🎨','💻','🏀','🎯','💀','🤝','📸','🎬','🌍'];

    // === UTILS ===
    function getAvatar(user, size = 40) {
      if (user?.photos?.[0]) return React.createElement('img', { src: user.photos[0], className: `rounded-full object-cover`, style: { width: size, height: size } });
      const name = user?.email?.split('@')[0] || '?';
      const colors = ['#5b8a72','#c4856a','#d4a574','#4caf50','#3d6b54','#7aab94','#e74c3c','#14b8a6'];
      const colorIdx = name.charCodeAt(0) % colors.length;
      return React.createElement('div', {
        className: 'rounded-full flex items-center justify-center text-white font-bold',
        style: { width: size, height: size, background: colors[colorIdx], fontSize: size * 0.4 }
      }, name.charAt(0).toUpperCase());
    }

    function isOnline(lastSeen) {
      if (!lastSeen) return false;
      return (Date.now() - new Date(lastSeen).getTime()) < 120000;
    }

    function playNotifSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 800; osc.type = 'sine';
        gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
        setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.frequency.value = 1000; o2.type = 'sine'; g2.gain.value = 0.1; o2.start(); o2.stop(ctx.currentTime + 0.15); }, 100);
      } catch(e) {}
    }

    function EmojiPicker({ onSelect, onClose }) {
      return React.createElement('div', { className: 'absolute bottom-full mb-2 right-0 bg-white shadow-xl rounded-xl p-3 pop-in z-50', style: { width: 280 } },
        React.createElement('div', { className: 'emoji-picker' },
          EMOJIS.map(e => React.createElement('button', { key: e, className: 'emoji-btn', onClick: () => { onSelect(e); onClose(); } }, e))
        )
      );
    }

    function Badges({ userId }) {
      const [badges, setBadges] = useState([]);
      const [rep, setRep] = useState(null);
      useEffect(() => { api.get('/badges?userId=' + userId).then(setBadges).catch(()=>{}); api.get('/reputation?userId=' + userId).then(setRep).catch(()=>{}); }, [userId]);
      if (!badges.length && !rep) return null;
      const badgeColors = { popular: 'bg-yellow-100 text-yellow-700', liked: 'bg-pink-100 text-pink-700', social: 'bg-blue-100 text-blue-700', topfriend: 'bg-purple-100 text-purple-700', active: 'bg-orange-100 text-orange-700', chatter: 'bg-green-100 text-green-700', new: 'bg-gray-100 text-gray-600', verified: 'bg-[var(--primary)]/10 text-[var(--primary-dark)]' };
      return React.createElement('div', { className: 'mb-3' },
        rep && React.createElement('p', { className: 'text-xs text-gray-500 mb-1' }, `⭐ Réputation: ${rep.score}`),
        React.createElement('div', { className: 'flex flex-wrap gap-1' },
          badges.map(b => React.createElement('span', { key: b.id, className: `badge-chip ${badgeColors[b.id] || 'bg-gray-100 text-gray-600'}`, title: b.desc }, `${b.icon} ${b.name}`))
        )
      );
    }

    // === STATUS HELPER ===
    const STATUS_LABELS = { available: '🟢 Disponible', busy: '🔴 Occupé(e)', studying: '🟡 En cours', away: '⚫ Absent(e)', invisible: '👻 Invisible' };
    const STATUS_COLORS = { available: '#22c55e', busy: '#ef4444', studying: '#f59e0b', away: '#9ca3af', invisible: '#6b7280' };
    const REACTION_EMOJIS = ['👍','❤️','😂','😮','😢','🔥'];

    // === COMPONENTS ===
    function Navbar({ page, navigate }) {
      const { user, logout, updateUser } = useAuth();
      const { dark, toggle } = useTheme();
      const [unread, setUnread] = useState(0);
      const [pending, setPending] = useState(0);
      const [xp, setXp] = useState({ xp: 0, level: 1, nextLevel: 50 });
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [statusMenu, setStatusMenu] = useState(false);
      useEffect(() => {
        if (!user) return;
        const f = () => { api.get('/notifications/unread-count').then(d => setUnread(d.count)).catch(()=>{}); api.get('/friends/pending').then(d => setPending(d.length)).catch(()=>{}); api.get('/users/xp').then(setXp).catch(()=>{}); };
        f(); const i = setInterval(f, 10000); return () => clearInterval(i);
      }, [user]);
      if (!user) return null;
      const tabs = [
        { id: 'messages', label: 'Messages', icon: '💬', badge: unread },
        { id: 'stories', label: 'Stories', icon: '📱', badge: 0 },
        { id: 'recherche', label: 'Recherche', icon: '🔍', badge: 0 },
        { id: 'explorer', label: 'Explorer', icon: '🧭', badge: 0 },
        { id: 'amis', label: 'Amis', icon: '👥', badge: pending },
        { id: 'likes', label: 'Likes reçus', icon: '❤️', badge: 0 },
        { id: 'sondages', label: 'Sondages', icon: '📊', badge: 0 },
        { id: 'bloques', label: 'Bloqués', icon: '🚫', badge: 0 },
        { id: 'stats', label: 'Stats', icon: '📈', badge: 0 },
        { id: 'compte', label: 'Mon Compte', icon: '⚙️', badge: 0 },
      ];
      const changeStatus = async (s) => { try { await updateUser({ status: s }); setStatusMenu(false); } catch(e) {} };
      const xpPct = xp.nextLevel > 0 ? Math.min(100, Math.round((xp.xp / xp.nextLevel) * 100)) : 0;
      return (
        <>
          <nav className="naturel-nav sticky top-0 z-50">
            <div className="max-w-4xl mx-auto px-4 flex items-center h-14">
              <button onClick={() => setDrawerOpen(true)} className="text-2xl mr-3 text-white/80 hover:text-white transition-colors">☰</button>
              <span className="logo-text cursor-pointer flex-1" onClick={() => navigate('/messages')}>TeenLink</span>
              <div className="flex items-center gap-2">
                <div className="hidden sm:flex items-center gap-1 bg-white/20 backdrop-blur-sm px-2.5 py-1 rounded-full text-xs">
                  <span className="font-bold text-white">Lv.{xp.level}</span>
                  <div className="w-16 h-1.5 bg-white/25 rounded-full overflow-hidden"><div className="h-full bg-white rounded-full transition-all" style={{width: xpPct+'%'}}/></div>
                </div>
                {unread > 0 && <span className="bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 shadow-lg">{unread}</span>}
                <div className="relative">
                  <button onClick={() => setStatusMenu(!statusMenu)} className="flex items-center gap-1 text-xs text-white/80 hover:text-white px-2 py-1 rounded-lg hover:bg-white/15 transition-all">

                  <div className="flex-1 min-w-0"><p className="font-semibold text-sm truncate" style={{color:'var(--text)'}}>{user.email.split('@')[0]}</p><p className="text-xs" style={{color:'var(--text-secondary)'}}>{STATUS_LABELS[user.status||'available']}</p></div>

    // === PAGES ===
    function Login({ navigate }) {
      const { login } = useAuth();
      const [form, setForm] = useState({ email: '', password: '' });
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [forgotMode, setForgotMode] = useState(false);
      const [resetEmail, setResetEmail] = useState('');
      const [resetMsg, setResetMsg] = useState('');
      const [verifyMode, setVerifyMode] = useState(false);
      const [verifyEmail, setVerifyEmail] = useState('');
      const [verifyCode, setVerifyCode] = useState('');
      const [verifyStep, setVerifyStep] = useState(0);
      const handleSubmit = async (e) => { e.preventDefault(); setError(''); setLoading(true); try { await login(form.email, form.password); navigate('/messages'); } catch (err) { setError(err.message); } finally { setLoading(false); } };
      const handleForgot = async (e) => { e.preventDefault(); setResetMsg(''); try { const d = await api.post('/auth/forgot-password', { email: resetEmail }); setResetMsg('Code envoyé ! (voir la console serveur)'); } catch(err) { setResetMsg(err.message); } };
      const handleVerify = async (e) => { e.preventDefault(); setResetMsg(''); try { if (verifyStep === 0) { await api.post('/auth/send-verification', { email: verifyEmail }); setResetMsg('Code envoyé ! (voir la console serveur)'); setVerifyStep(1); } else { await api.post('/auth/verify-email', { code: verifyCode }); setResetMsg('Email vérifié ! Tu peux te connecter.'); setVerifyMode(false); } } catch(err) { setResetMsg(err.message); } };
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] p-4">
          <div className="modal-glass rounded-2xl shadow-xl p-8 w-full max-w-md page-slide">
            <h1 className="text-3xl font-bold text-center text-gray-800 mb-1">TeenLink</h1>
            <p className="text-center text-gray-400 mb-6 text-sm">{forgotMode ? 'Réinitialiser le mot de passe' : verifyMode ? 'Vérifier ton email' : 'Connecte-toi'}</p>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
            {resetMsg && <div className="bg-blue-50 text-blue-600 p-3 rounded-lg mb-4 text-sm">{resetMsg}</div>}
            {!forgotMode && !verifyMode ? (
              <form onSubmit={handleSubmit} className="space-y-4">
                <input type="email" required placeholder="Email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none" />
                <input type="password" required placeholder="Mot de passe" value={form.password} onChange={e => setForm({...form, password: e.target.value})} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none" />
                <button type="submit" disabled={loading} className="w-full btn-primary py-3 disabled:opacity-50">{loading ? 'Connexion...' : 'Se connecter'}</button>
              </form>
            ) : forgotMode ? (
              <form onSubmit={handleForgot} className="space-y-4">
                <input type="email" required placeholder="Ton email" value={resetEmail} onChange={e => setResetEmail(e.target.value)} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none" />
                <button type="submit" className="w-full btn-primary py-3">Envoyer le code</button>
              </form>
            ) : (
              <form onSubmit={handleVerify} className="space-y-4">
                {verifyStep === 0 ? <input type="email" required placeholder="Ton email" value={verifyEmail} onChange={e => setVerifyEmail(e.target.value)} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none" />
                : <input type="text" required placeholder="Code de vérification" value={verifyCode} onChange={e => setVerifyCode(e.target.value)} className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none" />}
                <button type="submit" className="w-full btn-primary py-3">{verifyStep === 0 ? 'Envoyer le code' : 'Vérifier'}</button>
              </form>
            )}
            <div className="flex flex-col gap-2 mt-4 text-sm">
              <div className="flex justify-between">
                <button onClick={() => navigate('/inscription')} className="text-[var(--primary)] font-semibold hover:underline">S'inscrire</button>
                <button onClick={() => { setForgotMode(!forgotMode); setResetMsg(''); setError(''); }} className="text-gray-400 hover:text-[var(--primary)]">
                  {forgotMode ? 'Retour' : 'Mot de passe oublié ?'}
                </button>
              </div>
              {!forgotMode && <button onClick={() => { setVerifyMode(!verifyMode); setResetMsg(''); setError(''); setVerifyStep(0); }} className="text-gray-400 hover:text-[var(--primary)] text-left">Vérifier mon email</button>}
            </div>
          </div>
        </div>
      );
    }

    function Register({ navigate }) {
      const { register } = useAuth();
      const [step, setStep] = useState(1);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [form, setForm] = useState({ email:'', password:'', confirmPassword:'', age:'', sex:'', gender:'', hairColor:'', skinColor:'', eyeColor:'', height:'', weight:'', city:'', phone:'', interests:[] });
      const u = (f, v) => setForm({...form, [f]: v});
      const toggleI = (i) => u('interests', form.interests.includes(i) ? form.interests.filter(x => x !== i) : [...form.interests, i]);
      const v1 = () => { if (!form.email || !form.password || form.password !== form.confirmPassword) { setError('Vérifie les champs'); return false; } if (form.password.length < 6) { setError('Mot de passe min 6 car.'); return false; } if (form.age < 13 || form.age > 18) { setError('Âge 13-18 ans'); return false; } if (!form.sex || !form.gender) { setError('Sexe et genre requis'); return false; } return true; };
      const submit = async (e) => { e.preventDefault(); setError(''); if (!v1()) return; setLoading(true); try { const { confirmPassword, ...d } = form; d.age=+d.age; d.height=+d.height||0; d.weight=+d.weight||0; await register(d); navigate('/messages'); } catch(err) { setError(err.message); } finally { setLoading(false); } };
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] p-4">
          <div className="modal-glass rounded-2xl shadow-xl p-6 w-full max-w-lg page-slide">
            <h1 className="text-2xl font-bold text-center text-gray-800 mb-4">Inscription</h1>
            <div className="flex justify-center mb-4">{[1,2].map(s=><div key={s} className="flex items-center"><div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${step>=s?'bg-[var(--primary)] text-white':'bg-gray-200 text-gray-500'}`}>{s}</div>{s<2&&<div className={`w-8 h-0.5 ${step>s?'bg-[var(--primary)]':'bg-gray-200'}`}/>}</div>)}</div>
            {error && <div className="bg-red-50 text-red-600 p-2 rounded-lg mb-3 text-sm">{error}</div>}
            <form onSubmit={submit}>
              {step===1 && <div className="space-y-3">
                <input type="email" placeholder="Email *" required value={form.email} onChange={e=>u('email',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                <input type="tel" placeholder="Téléphone (optionnel)" value={form.phone} onChange={e=>u('phone',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                <input type="password" placeholder="Mot de passe *" required value={form.password} onChange={e=>u('password',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                <input type="password" placeholder="Confirmer *" required value={form.confirmPassword} onChange={e=>u('confirmPassword',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                <div className="grid grid-cols-2 gap-3">
                  <input type="number" min="13" max="18" placeholder="Âge *" required value={form.age} onChange={e=>u('age',e.target.value)} className="px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                  <select required value={form.sex} onChange={e=>u('sex',e.target.value)} className="px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"><option value="">Sexe *</option><option value="M">Masculin</option><option value="F">Féminin</option></select>
                </div>
                <select required value={form.gender} onChange={e=>u('gender',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"><option value="">Genre *</option><option value="homme">Homme</option><option value="femme">Femme</option><option value="non-binaire">Non-binaire</option><option value="trans-masc">Trans-masc</option><option value="trans-fem">Trans-fem</option></select>
                <input type="text" placeholder="Ville *" required value={form.city} onChange={e=>u('city',e.target.value)} className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-[var(--primary)] outline-none text-sm"/>
                <button type="button" onClick={()=>{if(v1())setStep(2)}} className="w-full btn-primary py-2.5">Suivant</button>
              </div>}
              {step===2 && <div className="space-y-3">
                <p className="text-sm text-gray-500">Centres d'intérêt (optionnel)</p>
                <div className="flex flex-wrap gap-2">{INTERESTS.map(i=><button key={i} type="button" onClick={()=>toggleI(i)} className={`px-3 py-1 rounded-full text-xs font-medium ${form.interests.includes(i)?'bg-[var(--primary)] text-white':'bg-gray-100 text-gray-700'}`}>{i}</button>)}</div>
                <div className="flex gap-2"><button type="button" onClick={()=>setStep(1)} className="flex-1 bg-gray-200 py-2.5 rounded-lg font-semibold">Retour</button><button type="submit" disabled={loading} className="flex-1 btn-primary py-2.5 disabled:opacity-50">{loading?'Création...':"S'inscrire"}</button></div>
              </div>}
            </form>
            <p className="text-center text-gray-400 mt-4 text-sm">Déjà inscrit ? <button onClick={()=>navigate('/connexion')} className="text-[var(--primary)] font-semibold hover:underline">Se connecter</button></p>
          </div>
        </div>
      );
    }

    function Messages({ navigate }) {
      const [convos, setConvos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const prevCount = useRef(0);
      useEffect(() => { api.get('/messages/conversations').then(d => { if (d.length > prevCount.current && prevCount.current > 0) playNotifSound(); prevCount.current = d.length; setConvos(d); }).catch(console.error).finally(()=>setLoading(false)); }, []);
      useEffect(() => { const i = setInterval(() => { api.get('/messages/conversations').then(d => { if (d.length > prevCount.current) playNotifSound(); prevCount.current = d.length; setConvos(d); }).catch(()=>{}); }, 8000); return () => clearInterval(i); }, []);
      const filtered = convos.filter(c => !search || c.user.email.toLowerCase().includes(search.toLowerCase()));
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-3">Messages</h1>
          {convos.length > 0 && <input type="text" placeholder="🔍 Rechercher une conversation..." value={search} onChange={e => setSearch(e.target.value)} className="w-full px-4 py-2.5 border rounded-xl text-sm mb-4 focus:ring-2 focus:ring-[var(--primary)] outline-none"/>}
          {filtered.length===0 ? <div className="text-center py-16"><p className="text-4xl mb-3">💬</p><p className="text-gray-400">{search ? 'Aucun résultat' : 'Aucune conversation'}</p>{!search && <button onClick={()=>navigate('/recherche')} className="text-[var(--primary)] text-sm hover:underline mt-1">Trouver des gens</button>}</div>
          : <div className="space-y-2">{filtered.map(c=>(
            <button key={c.user._id} onClick={()=>navigate('/chat/'+c.user._id)} className="w-full flex items-center gap-3 p-3 bg-white rounded-xl hover:bg-gray-50 transition shadow-sm text-left">
              <div className="relative flex-shrink-0">{getAvatar(c.user, 44)}{isOnline(c.user.lastSeen) && <div className="online-dot"/>}</div>
              <div className="flex-1 min-w-0"><div className="flex justify-between"><span className="font-semibold text-sm text-gray-800">{c.user.email.split('@')[0]}</span>{c.unread>0&&<span className="bg-[var(--primary)] text-white text-xs rounded-full w-4 h-4 flex items-center justify-center bounce">{c.unread}</span>}</div>{c.lastMessage&&<p className="text-xs text-gray-400 truncate">{c.lastMessage.content}</p>}</div>
            </button>
          ))}</div>}
        </div>
      );
    }

    function Chat({ userId, navigate }) {
      const { user: me } = useAuth();
      const [msgs, setMsgs] = useState([]);
      const [other, setOther] = useState(null);
      const [text, setText] = useState('');
      const [loading, setLoading] = useState(true);
      const [showEmoji, setShowEmoji] = useState(false);
      const [showStickers, setShowStickers] = useState(false);
      const [stickers, setStickers] = useState([]);
      const [recording, setRecording] = useState(false);
      const [recordTime, setRecordTime] = useState(0);
      const [reactMsgId, setReactMsgId] = useState(null);
      const mediaRecorder = useRef(null);
      const audioChunks = useRef([]);
      const recordInterval = useRef(null);
      const endRef = useRef(null);
      const prevCount = useRef(0);
      useEffect(() => { Promise.all([api.get('/messages/'+userId), api.get('/users/'+userId), api.get('/stickers')]).then(([m,u,s])=>{setMsgs(m);setOther(u);setStickers(s);prevCount.current=m.length;}).catch(()=>navigate('/messages')).finally(()=>setLoading(false)); }, [userId]);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);
      useEffect(() => { const i = setInterval(() => { api.get('/messages/'+userId).then(m => { if (m.length > prevCount.current) { playNotifSound(); setMsgs(m); } prevCount.current = m.length; }).catch(()=>{}); }, 5000); return () => clearInterval(i); }, [userId]);
      const send = async (e) => { e.preventDefault(); if (!text.trim()) return; try { const m = await api.post('/messages', { receiverId: userId, content: text.trim() }); setMsgs([...msgs, m]); setText(''); } catch(err) { alert(err.message); } };
      const sendSticker = async (sticker) => { try { const m = await api.post('/messages', { receiverId: userId, content: sticker.image }); setMsgs([...msgs, m]); setShowStickers(false); api.post('/stickers/' + sticker._id + '/download').catch(()=>{}); } catch(err) { alert(err.message); } };
      const sendPhoto = async (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onloadend = async () => { try { const m = await api.post('/messages', { receiverId: userId, content: r.result }); setMsgs([...msgs, m]); } catch(err) { alert(err.message); } }; r.readAsDataURL(file); };
      const toggleReaction = async (messageId, emoji) => { try { const r = await api.post('/messages/react', { messageId, emoji }); setMsgs(msgs.map(m => m._id === messageId ? {...m, reactions: r.reactions} : m)); setReactMsgId(null); } catch(err) {} };
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder.current = new MediaRecorder(stream);
          audioChunks.current = [];
          mediaRecorder.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.current.push(e.data); };
          mediaRecorder.current.onstop = async () => {
            const blob = new Blob(audioChunks.current, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = async () => {
              try { const m = await api.post('/messages', { receiverId: userId, content: reader.result, type: 'voice' }); setMsgs([...msgs, m]); } catch(err) { alert(err.message); }
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };
          mediaRecorder.current.start();
          setRecording(true);
          setRecordTime(0);
          recordInterval.current = setInterval(() => setRecordTime(t => t + 1), 1000);
        } catch(e) { alert('Microphone non disponible'); }
      };
      const stopRecording = () => { if (mediaRecorder.current && recording) { mediaRecorder.current.stop(); setRecording(false); clearInterval(recordInterval.current); } };
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 flex flex-col h-screen page-slide">
          <div className="flex items-center gap-3 mb-3 pb-3 border-b">
            <button onClick={()=>navigate('/messages')} className="text-gray-400 hover:text-gray-700 text-lg">←</button>
            <div className="relative">{getAvatar(other, 36)}{isOnline(other?.lastSeen) && <div className="online-dot"/>}</div>
            <div><span className="font-semibold text-sm text-gray-800">{other?.email?.split('@')[0]}</span>{isOnline(other?.lastSeen) && <p className="text-xs text-green-500">En ligne</p>}</div>
          </div>
          <div className="flex-1 overflow-y-auto space-y-2 mb-3 chat-scroll">
            {msgs.length===0&&<div className="text-center text-gray-300 py-8 text-sm">Commence la conversation !</div>}
            {msgs.map(m=>(
              <div key={m._id} className={`flex group ${m.sender._id===me.id?'justify-end':'justify-start'}`}>
                <div className="relative">
                  <div className={`max-w-[75%] px-3 py-2 rounded-2xl ${m.sender._id===me.id?'bg-[var(--primary)] text-white rounded-br-md shadow-md':'bg-gray-100 text-gray-800 rounded-bl-md'}`}>
                    {m.content && m.content.startsWith('data:image') ? <img src={m.content} className="rounded-lg max-w-full" style={{maxHeight:200}}/>
                      : m.type === 'voice' ? <audio controls src={m.content} className="max-w-full" style={{height:36}}/>
                      : <p className="text-sm">{m.content}</p>}
                    <p className={`text-xs mt-0.5 ${m.sender._id===me.id?'text-[var(--primary)]/80':'text-gray-400'}`}>{new Date(m.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</p>
                  </div>
                  {m.sender._id !== me.id && <button onClick={() => setReactMsgId(reactMsgId === m._id ? null : m._id)} className="absolute -bottom-1 -right-1 bg-white rounded-full shadow px-1.5 py-0.5 text-xs opacity-0 group-hover:opacity-100 transition">😊</button>}
                  {reactMsgId === m._id && <div className="absolute -bottom-8 right-0 bg-white shadow-lg rounded-full px-2 py-1 flex gap-0.5 z-10 pop-in">{REACTION_EMOJIS.map(e => <button key={e} onClick={() => toggleReaction(m._id, e)} className="text-sm hover:scale-125 transition">{e}</button>)}</div>}
                  {m.reactions && Object.keys(m.reactions).length > 0 && <div className="flex gap-1 mt-0.5 flex-wrap">{Object.entries(m.reactions).map(([e, v]) => <span key={e} className={`text-xs px-1.5 py-0.5 rounded-full cursor-pointer ${v.includes(me.id)?'bg-[var(--primary)]/10 text-[var(--primary)]':'bg-gray-100 text-gray-500'}`} onClick={() => toggleReaction(m._id, e)}>{e} {v.length}</span>)}</div>}
                </div>
              </div>
            ))}
            <div ref={endRef}/>
          </div>
          <div className="relative">
            {showEmoji && <EmojiPicker onSelect={(e) => setText(text + e)} onClose={() => setShowEmoji(false)}/>}
            {showStickers && <div className="absolute bottom-full mb-2 right-0 bg-white shadow-xl rounded-xl p-3 pop-in z-50" style={{width: 300, maxHeight: 250, overflowY: 'auto'}}>
              <p className="text-xs text-gray-400 mb-2">Stickers</p>
              <div className="grid grid-cols-5 gap-2">{stickers.map(s => <button key={s._id} onClick={() => sendSticker(s)} className="text-3xl hover:scale-110 transition p-1 rounded-lg hover:bg-gray-100" title={s.name}>{s.emoji || '🎨'}</button>)}</div>
            </div>}
            {recording ? (
              <div className="flex items-center gap-3 bg-red-50 rounded-full px-4 py-2">
                <div className="voice-btn voice-recording" onClick={stopRecording}><span className="text-white text-lg">⏹</span></div>
                <span className="text-red-500 font-semibold text-sm">{Math.floor(recordTime/60)}:{String(recordTime%60).padStart(2,'0')}</span>
                <span className="text-xs text-red-400 flex-1 text-center">Enregistrement...</span>
              </div>
            ) : (
              <form onSubmit={send} className="flex gap-2">
                <button type="button" onClick={() => { setShowEmoji(!showEmoji); setShowStickers(false); }} className="text-xl hover:scale-110 transition">😊</button>
                <button type="button" onClick={() => { setShowStickers(!showStickers); setShowEmoji(false); }} className="text-xl hover:scale-110 transition" title="Stickers">🎨</button>
                <label className="text-xl cursor-pointer hover:scale-110 transition flex items-center">📷<input type="file" accept="image/*" onChange={sendPhoto} className="hidden"/></label>
                <button type="button" onClick={startRecording} className="text-xl hover:scale-110 transition" title="Message vocal">🎙️</button>
                <input value={text} onChange={e=>setText(e.target.value)} placeholder="Écrire..." className="flex-1 px-4 py-2.5 border rounded-full text-sm focus:ring-2 focus:ring-[var(--primary)] outline-none"/>
                <button type="submit" disabled={!text.trim()} className="btn-primary px-5 py-2.5 rounded-full text-sm disabled:opacity-50">Envoyer</button>
              </form>
            )}
          </div>
        </div>
      );
    }

    function Search({ navigate }) {
      const [users, setUsers] = useState([]);
      const [suggested, setSuggested] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filters, setFilters] = useState({ city:'', ageMin:'', ageMax:'', interests:'' });

      useEffect(()=>{search(); api.get('/users/suggested').then(setSuggested).catch(()=>{});},[]);

          {u.bio && <p className="text-xs text-gray-500 mb-2 italic">"{u.bio}"</p>}
          <div className="flex flex-wrap gap-1 mb-2">{u.interests?.slice(0,3).map(i=><span key={i} className="bg-[var(--primary)]/5 text-[var(--primary)] text-xs px-2 py-0.5 rounded-full">{i}</span>)}</div>
          <button onClick={()=>navigate('/profil/'+u._id)} className="w-full bg-gray-100 text-gray-600 py-1.5 rounded-lg text-xs font-medium hover:bg-gray-200">Voir profil</button>

            <button onClick={()=>setTab('search')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${tab==='search'?'btn-primary':'bg-gray-200 text-gray-600'}`}>Recherche</button>
            <button onClick={()=>setTab('suggested')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${tab==='suggested'?'btn-primary':'bg-gray-200 text-gray-600'}`}>Suggestions ({suggested.length})</button>
          </div>
          {tab==='search' ? (<>
            <form onSubmit={search} className="bg-white rounded-xl shadow-sm p-4 mb-4">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">

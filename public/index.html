                <input type="number" min="13" max="18" placeholder="Âge min" value={filters.ageMin} onChange={e=>setFilters({...filters,ageMin:e.target.value})} className="px-3 py-2 border rounded-lg text-sm"/>
                <input type="number" min="13" max="18" placeholder="Âge max" value={filters.ageMax} onChange={e=>setFilters({...filters,ageMax:e.target.value})} className="px-3 py-2 border rounded-lg text-sm"/>
                <select value={filters.interests} onChange={e=>setFilters({...filters,interests:e.target.value})} className="px-3 py-2 border rounded-lg text-sm"><option value="">Intérêt</option>{INTERESTS.map(i=><option key={i}>{i}</option>)}</select>
              </div>
              <button type="submit" className="mt-3 btn-primary px-5 py-2">Rechercher</button>
            </form>
            {loading ? <div className="text-center text-gray-400 py-8">Recherche...</div>
            : users.length===0 ? <div className="text-center py-10"><p className="text-4xl mb-2">🔍</p><p className="text-gray-400 text-sm">Aucun résultat</p></div>
            : <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{users.map(renderCard)}</div>}
          </>) : (<>
            {suggested.length===0 ? <div className="text-center py-10"><p className="text-4xl mb-2">💡</p><p className="text-gray-400 text-sm">Aucune suggestion</p></div>
            : <div className="grid grid-cols-1 md:grid-cols-2 gap-3">{suggested.map(renderCard)}</div>}
          </>)}
        </div>
      );
    }

    function Friends({ navigate }) {
      const [friends, setFriends] = useState([]);
      const [pending, setPending] = useState([]);
      const [loading, setLoading] = useState(true);
      const fetch = async () => { try { const [f,p] = await Promise.all([api.get('/friends/list'), api.get('/friends/pending')]); setFriends(f); setPending(p); } catch(e){} finally{setLoading(false);} };
      useEffect(()=>{fetch();},[]);
      const accept = async (id) => { try { await api.put('/friends/accept/'+id); fetch(); } catch(e){alert(e.message);} };
      const reject = async (id) => { try { await api.put('/friends/reject/'+id); fetch(); } catch(e){alert(e.message);} };
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 fade-in">
          <h1 className="text-xl font-bold text-gray-800 mb-4">Amis</h1>
          {pending.length>0&&<div className="mb-6"><h2 className="text-sm font-semibold text-gray-500 mb-2">Demandes ({pending.length})</h2><div className="space-y-2">{pending.map(r=>(
            <div key={r._id} className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 flex items-center justify-between">
              <div className="flex items-center gap-2"><div className="relative">{getAvatar(r.sender,36)}{isOnline(r.sender.lastSeen) && <div className="online-dot"/>}</div><div><button onClick={()=>navigate('/profil/'+r.sender._id)} className="font-semibold text-sm hover:text-[var(--primary)]">{r.sender.email.split('@')[0]}</button><p className="text-xs text-gray-400">{r.sender.age} ans</p></div></div>
              <div className="flex gap-1"><button onClick={()=>accept(r._id)} className="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-semibold">Accepter</button><button onClick={()=>reject(r._id)} className="bg-red-500 text-white px-3 py-1 rounded-lg text-xs font-semibold">Refuser</button></div>
            </div>
          ))}</div></div>}
          <h2 className="text-sm font-semibold text-gray-500 mb-2">Mes amis ({friends.length})</h2>
          {friends.length===0 ? <div className="text-center py-8"><p className="text-4xl mb-2">👥</p><button onClick={()=>navigate('/recherche')} className="text-[var(--primary)] text-sm hover:underline">Trouver des amis</button></div>
          : <div className="space-y-2">{friends.map(f=>(
            <button key={f._id} onClick={()=>navigate('/chat/'+f._id)} className="w-full flex items-center gap-3 p-3 bg-white rounded-xl hover:bg-gray-50 transition shadow-sm text-left">
              <div className="relative flex-shrink-0">{getAvatar(f,40)}{isOnline(f.lastSeen) && <div className="online-dot"/>}</div>
              <div><span className="font-semibold text-sm">{f.email.split('@')[0]}</span><p className="text-xs text-gray-400">{f.age} ans · {f.city}</p></div>
            </button>
          ))}</div>}
        </div>
      );
    }

    function Account() {
      const { user, updateUser } = useAuth();
      const [form, setForm] = useState({ phone:user?.phone||'', city:user?.city||'', height:user?.height||'', weight:user?.weight||'', hairColor:user?.hairColor||'', skinColor:user?.skinColor||'', eyeColor:user?.eyeColor||'', interests:user?.interests||[], bio:user?.bio||'' });
      const [privacy, setPrivacy] = useState({ showAge:user?.privacy?.showAge!==false, showCity:user?.privacy?.showCity!==false, showPhotos:user?.privacy?.showPhotos!==false });
      const [pwForm, setPwForm] = useState({ currentPassword:'', newPassword:'', confirmPassword:'' });
      const [msg, setMsg] = useState('');
      const [loading, setLoading] = useState(false);
      const [pwMsg, setPwMsg] = useState('');
      const u = (f,v) => setForm({...form,[f]:v});
      const toggleI = (i) => u('interests', form.interests.includes(i)?form.interests.filter(x=>x!==i):[...form.interests,i]);
      const uploadPhoto = (e, idx) => { const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onloadend = async()=>{ const p=[...(user.photos||[])]; p[idx]=r.result; try{await updateUser({photos:p}); setMsg('Photo mise à jour !');}catch(e){setMsg('Erreur');} }; r.readAsDataURL(file); };
      const removePhoto = async (idx) => { const p=[...(user.photos||[])]; p.splice(idx,1); try{await updateUser({photos:p});}catch(e){} };
      const submit = async (e) => { e.preventDefault(); setLoading(true); setMsg(''); try { await updateUser({...form, height:+form.height||0, weight:+form.weight||0, privacy}); setMsg('Sauvegardé !'); } catch(e){setMsg('Erreur');} finally{setLoading(false);} };
      const changePw = async (e) => { e.preventDefault(); setPwMsg(''); if (pwForm.newPassword !== pwForm.confirmPassword) { setPwMsg('Les mots de passe ne correspondent pas'); return; } try { await api.post('/auth/change-password', pwForm); setPwMsg('Mot de passe changé !'); setPwForm({ currentPassword:'', newPassword:'', confirmPassword:'' }); } catch(err) { setPwMsg(err.message); } };
      return (
        <div className="max-w-xl mx-auto p-4 fade-in">
          <h1 className="text-xl font-bold text-gray-800 mb-4">Mon Compte</h1>
          {msg&&<div className={`p-2 rounded-lg mb-3 text-sm ${msg.includes('Erreur')?'bg-red-50 text-red-600':'bg-green-50 text-green-600'}`}>{msg}</div>}
          <div className="bg-white rounded-xl shadow-sm p-4 mb-4">
            <h2 className="text-sm font-semibold text-gray-500 mb-3">Photos (max 3)</h2>
            <div className="grid grid-cols-3 gap-3">{[0,1,2].map(i=>(
              <div key={i} className="relative aspect-square bg-gray-100 rounded-xl flex items-center justify-center overflow-hidden">
                {user?.photos?.[i] ? <><img src={user.photos[i]} className="w-full h-full object-cover"/><button onClick={()=>removePhoto(i)} className="absolute top-1 right-1 bg-red-500 text-white w-5 h-5 rounded-full text-xs">×</button></>
                : <label className="cursor-pointer w-full h-full flex items-center justify-center hover:bg-gray-200"><span className="text-2xl text-gray-300">+</span><input type="file" accept="image/*" onChange={e=>uploadPhoto(e,i)} className="hidden"/></label>}
              </div>
            ))}</div>
          </div>
          <form onSubmit={submit} className="bg-white rounded-xl shadow-sm p-4 space-y-3 mb-4">
            <h2 className="text-sm font-semibold text-gray-500">Informations</h2>
            <input value={user?.email} disabled className="w-full px-3 py-2 bg-gray-50 border rounded-lg text-sm text-gray-400"/>
            <textarea placeholder="Bio / Description de toi..." value={form.bio} onChange={e=>u('bio',e.target.value)} maxLength={200} className="w-full px-3 py-2 border rounded-lg text-sm resize-none" rows={2}/>
            <input placeholder="Téléphone" value={form.phone} onChange={e=>u('phone',e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm"/>
            <div className="grid grid-cols-3 gap-2">
              <select value={form.hairColor} onChange={e=>u('hairColor',e.target.value)} className="px-2 py-2 border rounded-lg text-xs">{HAIR.map(c=><option key={c}>{c}</option>)}</select>
              <select value={form.skinColor} onChange={e=>u('skinColor',e.target.value)} className="px-2 py-2 border rounded-lg text-xs">{SKIN.map(c=><option key={c}>{c}</option>)}</select>
              <select value={form.eyeColor} onChange={e=>u('eyeColor',e.target.value)} className="px-2 py-2 border rounded-lg text-xs">{EYES.map(c=><option key={c}>{c}</option>)}</select>
            </div>
            <div className="grid grid-cols-3 gap-2">
              <input placeholder="Ville" value={form.city} onChange={e=>u('city',e.target.value)} className="px-3 py-2 border rounded-lg text-sm"/>
              <input type="number" placeholder="Taille cm" value={form.height} onChange={e=>u('height',e.target.value)} className="px-3 py-2 border rounded-lg text-sm"/>
              <input type="number" placeholder="Poids kg" value={form.weight} onChange={e=>u('weight',e.target.value)} className="px-3 py-2 border rounded-lg text-sm"/>
            </div>
            <div><p className="text-xs text-gray-500 mb-1">Centres d'intérêt</p><div className="flex flex-wrap gap-1">{INTERESTS.map(i=><button key={i} type="button" onClick={()=>toggleI(i)} className={`px-2 py-0.5 rounded-full text-xs ${form.interests.includes(i)?'bg-[var(--primary)] text-white':'bg-gray-100 text-gray-600'}`}>{i}</button>)}</div></div>
            <button type="submit" disabled={loading} className="w-full btn-primary py-2 disabled:opacity-50">{loading?'Sauvegarde...':'Sauvegarder'}</button>
          </form>
          <div className="bg-white rounded-xl shadow-sm p-4 space-y-3 mb-4">
            <h2 className="text-sm font-semibold text-gray-500">Confidentialité</h2>
            <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={privacy.showAge} onChange={e=>setPrivacy({...privacy,showAge:e.target.checked})} className="rounded"/><span>Afficher mon âge</span></label>
            <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={privacy.showCity} onChange={e=>setPrivacy({...privacy,showCity:e.target.checked})} className="rounded"/><span>Afficher ma ville</span></label>
            <label className="flex items-center gap-3 text-sm"><input type="checkbox" checked={privacy.showPhotos} onChange={e=>setPrivacy({...privacy,showPhotos:e.target.checked})} className="rounded"/><span>Afficher mes photos</span></label>
          </div>
          <div className="bg-white rounded-xl shadow-sm p-4 space-y-3">
            <h2 className="text-sm font-semibold text-gray-500">Changer le mot de passe</h2>
            {pwMsg&&<div className={`p-2 rounded-lg text-sm ${pwMsg.includes('Erreur')||pwMsg.includes('ne correspondent')?'bg-red-50 text-red-600':'bg-green-50 text-green-600'}`}>{pwMsg}</div>}
            <form onSubmit={changePw} className="space-y-2">
              <input type="password" placeholder="Mot de passe actuel" required value={pwForm.currentPassword} onChange={e=>setPwForm({...pwForm,currentPassword:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/>
              <input type="password" placeholder="Nouveau mot de passe (min 6 car.)" required value={pwForm.newPassword} onChange={e=>setPwForm({...pwForm,newPassword:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/>
              <input type="password" placeholder="Confirmer" required value={pwForm.confirmPassword} onChange={e=>setPwForm({...pwForm,confirmPassword:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/>
              <button type="submit" className="w-full bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold hover:bg-gray-300">Changer</button>
            </form>
          </div>
        </div>
      );
    }

    function Profile({ userId, navigate }) {
      const { user: me } = useAuth();
      const [profile, setProfile] = useState(null);
      const [status, setStatus] = useState({ status: 'none' });
      const [loading, setLoading] = useState(true);
      const [likeData, setLikeData] = useState({ liked: false, count: 0 });
      const [showReport, setShowReport] = useState(false);
      const [reportReason, setReportReason] = useState('');
      const [showMenu, setShowMenu] = useState(false);
      const [compat, setCompat] = useState(null);
      const [mutualFriends, setMutualFriends] = useState([]);
      const isBlocked = me?.blockedUsers?.includes(userId);
      useEffect(()=>{Promise.all([api.get('/users/'+userId),api.get('/friends/status/'+userId),api.get('/likes/check?userId='+userId),api.get('/users/compatibility?userId='+userId),api.get('/users/mutual-friends?userId='+userId)]).then(([p,s,l,c,mf])=>{setProfile(p);setStatus(s);setLikeData(l);setCompat(c);setMutualFriends(mf);}).catch(()=>{}).finally(()=>setLoading(false));},[userId]);
      const addFriend = async()=>{try{await api.post('/friends/request',{receiverId:userId});setStatus({status:'pending'});}catch(e){alert(e.message);}};
      const toggleLike = async()=>{try{if(likeData.liked){await api.post('/likes/unlike',{userId});setLikeData({liked:false,count:likeData.count-1});}else{await api.post('/likes',{userId});setLikeData({liked:true,count:likeData.count+1});}}catch(e){alert(e.message);}};
      const blockUser = async()=>{if(!confirm('Bloquer cette personne ?'))return;try{await api.post('/users/block',{userId});alert('Utilisateur bloqué');navigate('/recherche');}catch(e){alert(e.message);}};
      const unblockUser = async()=>{try{await api.post('/users/unblock',{userId});setProfile({...profile});alert('Débloqué');}catch(e){alert(e.message);}};
      const reportUser = async()=>{if(!reportReason){alert('Choisissez une raison');return;}try{await api.post('/reports',{reportedUser:userId,reason:reportReason});setShowReport(false);setReportReason('');alert('Signalement envoyé');}catch(e){alert(e.message);}};
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      if (!profile) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Non trouvé</div>;
      if (isBlocked) return <div className="max-w-xl mx-auto p-4 text-center py-20"><p className="text-gray-400 mb-4">Cet utilisateur est bloqué</p><button onClick={unblockUser} className="text-[var(--primary)] text-sm hover:underline">Débloquer</button></div>;
      const own = me.id === userId;
      const compatColor = compat?.score >= 70 ? '#22c55e' : compat?.score >= 40 ? '#f59e0b' : '#ef4444';
      return (
        <div className="max-w-xl mx-auto p-4 fade-in">
          <div className="card-nature rounded-2xl overflow-hidden">
            <div className="profile-header h-24"/>
            <div className="px-5 pb-5">
              <div className="flex items-end gap-3 -mt-10 mb-3">
                <div className="relative">{getAvatar(profile, 80)}{isOnline(profile.lastSeen) && <div className="online-dot" style={{borderColor:'white'}}/>}</div>
                <div className="pb-1 flex-1">
                  <h1 className="text-lg font-bold text-gray-800">{profile.email.split('@')[0]}</h1>
                  <p className="text-xs text-gray-400">{profile.age} ans · {profile.city} {isOnline(profile.lastSeen) && <span className="text-green-500 font-medium">· En ligne</span>}</p>
                </div>
                {!own && <div className="relative">
                  <button onClick={()=>setShowMenu(!showMenu)} className="text-gray-400 hover:text-gray-600 text-xl">⋯</button>
                  {showMenu && <div className="absolute right-0 top-8 bg-white shadow-lg rounded-lg py-1 z-10 w-40 text-sm">
                    <button onClick={()=>{blockUser();setShowMenu(false);}} className="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-600">Bloquer</button>
                    <button onClick={()=>{setShowReport(true);setShowMenu(false);}} className="w-full text-left px-4 py-2 hover:bg-gray-100 text-orange-600">Signaler</button>
                  </div>}
                </div>}
              </div>
              {profile.bio && <p className="text-sm text-gray-600 mb-3 italic bg-gray-50 rounded-lg p-3">"{profile.bio}"</p>}
              <Badges userId={userId}/>
              {!own && compat && compat.score > 0 && (
                <div className="flex items-center gap-3 mb-3 bg-gray-50 rounded-xl p-3">
                  <div className="compat-ring" style={{border: `3px solid ${compatColor}`, color: compatColor}}>{compat.score}%</div>
                  <div><p className="text-xs font-semibold text-gray-600">Score de compatibilité</p><p className="text-xs text-gray-400">Basé sur vos centres d'intérêt et votre profil</p></div>
                </div>
              )}
              {!own&&<div className="mb-4 flex gap-2 items-center">
                {status.status==='none'&&<button onClick={addFriend} className="btn-primary px-5 py-1.5 rounded-lg text-sm">Ajouter en ami</button>}
                {status.status==='pending'&&<span className="bg-yellow-100 text-yellow-700 px-4 py-1.5 rounded-lg text-xs font-medium">Demande envoyée</span>}
                {status.status==='accepted'&&<button onClick={()=>navigate('/chat/'+userId)} className="bg-green-500 text-white px-5 py-1.5 rounded-lg text-sm font-semibold hover:bg-green-600">Envoyer un message</button>}
                <button onClick={toggleLike} className={`px-3 py-1.5 rounded-lg text-sm font-semibold ${likeData.liked?'bg-pink-500 text-white':'bg-pink-100 text-pink-600'}`}>
                  {likeData.liked ? '❤️' : '🤍'} {likeData.count > 0 ? likeData.count : ''}
                </button>
              </div>}
              {mutualFriends.length > 0 && (
                <div className="mb-4 bg-gray-50 rounded-xl p-3">
                  <p className="text-xs font-semibold text-gray-500 mb-2">👥 Amis en commun ({mutualFriends.length})</p>
                  <div className="flex flex-wrap gap-2">
                    {mutualFriends.slice(0, 6).map(f => (
                      <button key={f._id} onClick={() => navigate('/profil/' + f._id)} className="flex items-center gap-1 bg-white px-2 py-1 rounded-full text-xs hover:bg-gray-100">
                        {getAvatar(f, 20)}<span>{f.email.split('@')[0]}</span>
                      </button>
                    ))}
                    {mutualFriends.length > 6 && <span className="text-xs text-gray-400">+{mutualFriends.length - 6}</span>}
                  </div>
                </div>
              )}
              <div className="grid grid-cols-2 gap-3 mb-4 text-xs">
                <div className="bg-gray-50 rounded-xl p-3"><p className="font-medium text-gray-500 mb-1">À propos</p><p>Sexe : {profile.sex==='M'?'Masculin':'Féminin'}</p><p>Genre : {profile.gender}</p><p>Taille : {profile.height} cm</p><p>Poids : {profile.weight} kg</p></div>
                <div className="bg-gray-50 rounded-xl p-3"><p className="font-medium text-gray-500 mb-1">Apparence</p><p>Cheveux : {profile.hairColor}</p><p>Peau : {profile.skinColor}</p><p>Yeux : {profile.eyeColor}</p></div>
              </div>
              {profile.interests?.length>0&&<div><p className="text-xs text-gray-500 mb-1">Centres d'intérêt</p><div className="flex flex-wrap gap-1">{profile.interests.map(i=><span key={i} className="bg-[var(--primary)]/5 text-[var(--primary)] text-xs px-2 py-0.5 rounded-full">{i}</span>)}</div></div>}
            </div>
          </div>
          {showReport && <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="modal-glass rounded-2xl p-6 w-full max-w-sm">
              <h3 className="font-bold text-lg mb-3">Signaler</h3>
              <select value={reportReason} onChange={e=>setReportReason(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm mb-3">
                <option value="">Choisir une raison...</option>
                <option value="spam">Spam</option>
                <option value="inappropriate">Contenu inapproprié</option>
                <option value="harassment">Harcèlement</option>
                <option value="fake">Faux profil</option>
                <option value="underaged">Mineur se faisant passer pour majeur</option>
                <option value="other">Autre</option>
              </select>
              <div className="flex gap-2"><button onClick={()=>setShowReport(false)} className="flex-1 bg-gray-200 py-2 rounded-lg text-sm font-semibold">Annuler</button><button onClick={reportUser} className="flex-1 bg-red-500 text-white py-2 rounded-lg text-sm font-semibold">Signaler</button></div>
            </div>
          </div>}
        </div>
      );
    }

    // === STORIES PAGE ===
    function Stories({ navigate }) {
      const { user } = useAuth();
      const [stories, setStories] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [caption, setCaption] = useState('');
      const [selectedEmoji, setSelectedEmoji] = useState('');
      const emojis = ['😀','😂','😍','🥺','😎','🤩','🥳','😴','🤔','😈','💀','🤡','👻','🎃','🦄','🌈','🔥','⭐','💫','🎵','🎮','⚽','🏀','🍕','🍔','🍟','🍿','☕','🍩','🎂','🍰','🎁','🎄','🎯','🎲','🎸','🎹','🎺','🎷','📸','✈️','🚀','🌍','🐶','🐱','🦊','🐻','🐼'];
      const fetchStories = () => api.get('/stories').then(setStories).catch(()=>{}).finally(()=>setLoading(false));
      useEffect(() => { fetchStories(); }, []);
      const createStory = async () => { if (!selectedEmoji) return; try { await api.post('/stories', { content: selectedEmoji, caption }); setShowCreate(false); setSelectedEmoji(''); setCaption(''); fetchStories(); } catch(e) { alert(e.message); } };
      const reactStory = async (storyId, emoji) => { try { await api.post('/stories/' + storyId + '/react', { emoji }); fetchStories(); } catch(e) {} };
      const deleteStory = async (storyId) => { if (!confirm('Supprimer cette story ?')) return; try { await api.del('/stories/' + storyId); fetchStories(); } catch(e) {} };
      const myStory = stories.find(s => s.isMine);
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-4">📱 Stories</h1>
          <div className="mb-4">
            <div className="flex items-center gap-3 p-3 bg-white rounded-xl shadow-sm">
              {getAvatar(user, 48)}
              <div className="flex-1">
                {myStory ? <div><p className="text-sm font-semibold">Ta story</p><p className="text-xs text-gray-400">{myStory.content} {myStory.caption} · Expire dans {Math.max(0, 24 - Math.floor((Date.now() - new Date(myStory.createdAt).getTime()) / 3600000))}h</p></div>
                : <button onClick={() => setShowCreate(true)} className="text-left text-sm text-gray-400 hover:text-[var(--primary)]">Créer une story...</button>}
              </div>
              {myStory && <button onClick={() => deleteStory(myStory._id)} className="text-red-400 text-xs hover:text-red-600">Suppr.</button>}
              <button onClick={() => setShowCreate(true)} className="btn-primary px-3 py-1.5">+</button>
            </div>
          </div>
          {stories.filter(s => !s.isMine).length === 0 && !myStory && <div className="text-center py-12"><p className="text-4xl mb-2">📱</p><p className="text-gray-400 text-sm">Aucune story pour l'instant</p></div>}
          <div className="space-y-3">
            {stories.filter(s => !s.isMine).map(s => (
              <div key={s._id} className="bg-white rounded-xl shadow-sm p-4">
                <div className="flex items-center gap-2 mb-2">
                  <div className="relative">{getAvatar(s.user, 32)}{isOnline(s.user?.lastSeen) && <div className="online-dot"/>}</div>
                  <button onClick={() => navigate('/profil/' + s.user._id)} className="font-semibold text-sm hover:text-[var(--primary)]">{s.user?.email?.split('@')[0]}</button>
                  <span className="text-xs text-gray-400 ml-auto">{new Date(s.createdAt).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
                <div className="text-center py-4"><span className="text-6xl">{s.content}</span>{s.caption && <p className="text-sm text-gray-500 mt-2">{s.caption}</p>}</div>
                <div className="flex gap-1 mt-2">{REACTION_EMOJIS.map(e => <button key={e} onClick={() => reactStory(s._id, e)} className="text-lg hover:scale-125 transition px-1">{e}</button>)}</div>
                {s.reactions && Object.keys(s.reactions).length > 0 && <div className="flex gap-1 mt-1">{Object.entries(s.reactions).map(([e, v]) => <span key={e} className="text-xs bg-gray-100 px-1.5 py-0.5 rounded-full">{e} {v.length}</span>)}</div>}
              </div>
            ))}
          </div>
          {showCreate && <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="modal-glass rounded-2xl p-6 w-full max-w-sm max-h-[80vh] overflow-y-auto">
              <h3 className="font-bold text-lg mb-3">Nouvelle Story</h3>
              <p className="text-xs text-gray-400 mb-2">Choisis un emoji :</p>
              <div className="grid grid-cols-8 gap-1 mb-3">{emojis.map(e => <button key={e} onClick={() => setSelectedEmoji(e)} className={`text-2xl p-1 rounded-lg ${selectedEmoji===e?'bg-[var(--primary)]/10 ring-2 ring-[var(--primary)]':'hover:bg-gray-100'}`}>{e}</button>)}</div>
              <input placeholder="Légende (optionnel)" value={caption} onChange={e => setCaption(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm mb-3"/>
              <div className="flex gap-2"><button onClick={() => setShowCreate(false)} className="flex-1 bg-gray-200 py-2 rounded-lg text-sm font-semibold">Annuler</button><button onClick={createStory} disabled={!selectedEmoji} className="flex-1 btn-primary py-2 disabled:opacity-50">Publier</button></div>
            </div>
          </div>}
        </div>
      );
    }

    // === EXPLORER PAGE ===
    function Explorer({ navigate }) {
      const [profiles, setProfiles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filters, setFilters] = useState({ city: '', interest: '', ageMin: '', ageMax: '' });
      const explore = (e) => { e?.preventDefault(); setLoading(true); const p = new URLSearchParams(); if (filters.city) p.append('city', filters.city); if (filters.interest) p.append('interest', filters.interest); if (filters.ageMin) p.append('ageMin', filters.ageMin); if (filters.ageMax) p.append('ageMax', filters.ageMax); api.get('/users/explore?' + p.toString()).then(setProfiles).catch(()=>{}).finally(()=>setLoading(false)); };
      useEffect(() => { explore(); }, []);
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-4">🧭 Explorer</h1>
          <form onSubmit={explore} className="bg-white rounded-xl shadow-sm p-3 mb-4">
            <div className="grid grid-cols-2 gap-2 mb-2">
              <input placeholder="Ville" value={filters.city} onChange={e => setFilters({...filters, city: e.target.value})} className="px-3 py-2 border rounded-lg text-sm"/>
              <select value={filters.interest} onChange={e => setFilters({...filters, interest: e.target.value})} className="px-3 py-2 border rounded-lg text-sm"><option value="">Intérêt</option>{INTERESTS.map(i => <option key={i}>{i}</option>)}</select>
            </div>
            <div className="flex gap-2 items-center">
              <input type="number" min="13" max="18" placeholder="Âge min" value={filters.ageMin} onChange={e => setFilters({...filters, ageMin: e.target.value})} className="px-3 py-2 border rounded-lg text-sm w-20"/>
              <input type="number" min="13" max="18" placeholder="Âge max" value={filters.ageMax} onChange={e => setFilters({...filters, ageMax: e.target.value})} className="px-3 py-2 border rounded-lg text-sm w-20"/>
              <button type="submit" className="flex-1 btn-primary py-2">Découvrir</button>
            </div>
          </form>
          {loading ? <div className="text-center text-gray-400 py-8">Chargement...</div>
          : profiles.length === 0 ? <div className="text-center py-12"><p className="text-4xl mb-2">🌍</p><p className="text-gray-400 text-sm">Aucun profil trouvé. Essaie d'autres filtres !</p></div>
          : <div className="space-y-3">{profiles.map(u => (
            <div key={u._id} className="bg-white rounded-xl shadow-sm p-4 hover:shadow transition">
              <div className="flex items-center gap-3">
                <div className="relative">{getAvatar(u, 52)}{isOnline(u.lastSeen) && <div className="online-dot"/>}</div>
                <div className="flex-1 min-w-0">
                  <button onClick={() => navigate('/profil/' + u._id)} className="font-semibold text-sm text-gray-800 hover:text-[var(--primary)]">{u.email.split('@')[0]}</button>
                  <p className="text-xs text-gray-400">{u.age} ans · {u.city}</p>
                  {u.interests?.length > 0 && <div className="flex flex-wrap gap-1 mt-1">{u.interests.slice(0, 3).map(i => <span key={i} className="bg-[var(--primary)]/5 text-[var(--primary)] text-xs px-2 py-0.5 rounded-full">{i}</span>)}</div>}
                  {u.level > 1 && <span className="text-xs bg-yellow-50 text-yellow-600 px-2 py-0.5 rounded-full mt-1 inline-block">Lv.{u.level}</span>}
                </div>
                <button onClick={() => navigate('/profil/' + u._id)} className="bg-[var(--primary)]/5 text-[var(--primary)] px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-[var(--primary)]/10">Voir</button>
              </div>
            </div>
          ))}</div>}
        </div>
      );
    }

    // === POLLS PAGE ===
    function Polls({ navigate }) {
      const [polls, setPolls] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [question, setQuestion] = useState('');
      const [options, setOptions] = useState(['', '']);
      const fetchPolls = () => api.get('/polls/recent').then(setPolls).catch(()=>{}).finally(()=>setLoading(false));
      useEffect(() => { fetchPolls(); }, []);
      const createPoll = async (e) => { e.preventDefault(); const validOpts = options.filter(o => o.trim()); if (validOpts.length < 2 || !question.trim()) return; try { await api.post('/polls', { question: question.trim(), options: validOpts }); setShowCreate(false); setQuestion(''); setOptions(['', '']); fetchPolls(); } catch(err) { alert(err.message); } };
      const vote = async (pollId, option) => { try { await api.post('/polls/' + pollId + '/vote', { option }); fetchPolls(); } catch(err) { alert(err.message); } };
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <div className="flex items-center justify-between mb-4">
            <h1 className="text-xl font-bold text-gray-800">📊 Sondages</h1>
              <button onClick={() => setShowCreate(true)} className="btn-primary px-3 py-1.5">+ Créer</button>
          </div>
          {polls.length === 0 && <div className="text-center py-12"><p className="text-4xl mb-2">📊</p><p className="text-gray-400 text-sm">Aucun sondage. Sois le premier !</p></div>}
          <div className="space-y-3">
            {polls.map(p => {
              const total = p.options.reduce((s, o) => s + o.voters.length, 0);
              const userVote = p.options.find(o => o.voters.includes(useAuth().user._id));
              return (
                <div key={p._id} className="bg-white rounded-xl shadow-sm p-4">
                  <div className="flex items-center gap-2 mb-2">
                    {p.creator && <>{getAvatar(p.creator, 24)}<span className="text-xs text-gray-500">{p.creator.email.split('@')[0]}</span></>}
                    <span className="text-xs text-gray-400 ml-auto">{new Date(p.createdAt).toLocaleDateString('fr-FR')}</span>
                  </div>
                  <p className="font-semibold text-sm text-gray-800 mb-3">{p.question}</p>
                  <div className="space-y-2">
                    {p.options.map(o => {
                      const pct = total > 0 ? Math.round((o.voters.length / total) * 100) : 0;
                      const isVoted = userVote?.text === o.text;
                      return (
                        <button key={o.text} onClick={() => vote(p._id, o.text)} className={`w-full text-left rounded-lg p-2.5 text-sm relative overflow-hidden border ${isVoted ? 'border-[var(--primary)] bg-[var(--primary)]/5' : 'border-gray-200 hover:border-[var(--primary-light)]'}`}>
                          <div className="absolute inset-0 bg-[var(--primary)]/10 transition-all" style={{width: pct + '%', opacity: 0.5}}/>
                          <span className="relative flex justify-between"><span>{o.text}</span><span className="font-semibold">{o.voters.length > 0 ? pct + '%' : ''}</span></span>
                        </button>
                      );
                    })}
                  </div>
                  <p className="text-xs text-gray-400 mt-2">{total} vote{total !== 1 ? 's' : ''}</p>
                </div>
              );
            })}
          </div>
          {showCreate && <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="modal-glass rounded-2xl p-6 w-full max-w-sm">
              <h3 className="font-bold text-lg mb-3">Nouveau Sondage</h3>
              <form onSubmit={createPoll} className="space-y-3">
                <input placeholder="Ta question ?" value={question} onChange={e => setQuestion(e.target.value)} required className="w-full px-3 py-2 border rounded-lg text-sm"/>
                {options.map((o, i) => <input key={i} placeholder={`Option ${i+1}`} value={o} onChange={e => { const n = [...options]; n[i] = e.target.value; setOptions(n); }} className="w-full px-3 py-2 border rounded-lg text-sm"/>)}
                {options.length < 6 && <button type="button" onClick={() => setOptions([...options, ''])} className="text-[var(--primary)] text-xs hover:underline">+ Ajouter une option</button>}
                <div className="flex gap-2"><button type="button" onClick={() => setShowCreate(false)} className="flex-1 bg-gray-200 py-2 rounded-lg text-sm font-semibold">Annuler</button><button type="submit" className="flex-1 btn-primary py-2">Créer</button></div>
              </form>
            </div>
          </div>}
        </div>
      );
    }

    // === LIKES RECEIVED PAGE ===
    function LikesReceived({ navigate }) {
      const [likes, setLikes] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => { api.get('/likes/received').then(setLikes).catch(()=>{}).finally(()=>setLoading(false)); }, []);
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-4">❤️ Likes reçus ({likes.length})</h1>
          {likes.length === 0 ? (
            <div className="text-center py-16"><p className="text-4xl mb-3">💔</p><p className="text-gray-400">Aucun like reçu pour l'instant</p></div>
          ) : (
            <div className="space-y-2">{likes.map(u => (
              <button key={u._id} onClick={() => navigate('/profil/' + u._id)} className="w-full flex items-center gap-3 p-3 bg-white rounded-xl hover:bg-gray-50 transition shadow-sm text-left">
                <div className="relative flex-shrink-0">{getAvatar(u, 44)}{isOnline(u.lastSeen) && <div className="online-dot"/>}</div>
                <div className="flex-1 min-w-0">
                  <span className="font-semibold text-sm text-gray-800">{u.email.split('@')[0]}</span>
                  <p className="text-xs text-gray-400">{u.age} ans · {u.city}</p>
                </div>
                <span className="text-xs text-gray-400">{new Date(u.likedAt).toLocaleDateString('fr-FR')}</span>
              </button>
            ))}</div>
          )}
        </div>
      );
    }

    // === BLOCKED LIST PAGE ===
    function BlockedList({ navigate }) {
      const [blocked, setBlocked] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => { api.get('/users/blocked').then(setBlocked).catch(()=>{}).finally(()=>setLoading(false)); }, []);
      const unblock = async (id) => { try { await api.post('/users/unblock', { userId: id }); setBlocked(blocked.filter(b => b._id !== id)); } catch(e) { alert(e.message); } };
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-4">🚫 Utilisateurs bloqués ({blocked.length})</h1>
          {blocked.length === 0 ? (
            <div className="text-center py-16"><p className="text-4xl mb-3">✅</p><p className="text-gray-400">Aucun utilisateur bloqué</p></div>
          ) : (
            <div className="space-y-2">{blocked.map(u => (
              <div key={u._id} className="flex items-center gap-3 p-3 bg-white rounded-xl shadow-sm">
                <div className="relative flex-shrink-0">{getAvatar(u, 40)}</div>
                <div className="flex-1 min-w-0">
                  <button onClick={() => navigate('/profil/' + u._id)} className="font-semibold text-sm text-gray-800 hover:text-[var(--primary)]">{u.email.split('@')[0]}</button>
                  <p className="text-xs text-gray-400">{u.age} ans · {u.city}</p>
                </div>
                <button onClick={() => unblock(u._id)} className="bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs font-semibold hover:bg-gray-300">Débloquer</button>
              </div>
            ))}</div>
          )}
        </div>
      );
    }

    // === STATS PAGE ===
    function Stats({ navigate }) {
      const { user } = useAuth();
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => { api.get('/users/stats').then(setStats).catch(()=>{}).finally(()=>setLoading(false)); }, []);
      if (loading) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Chargement...</div>;
      if (!stats) return <div className="max-w-xl mx-auto p-4 text-center text-gray-400 py-20">Erreur</div>;
      const cards = [
        { label: 'Amis', value: stats.friends, icon: '👥', color: 'bg-blue-50 text-blue-600' },
        { label: 'Likes reçus', value: stats.likesReceived, icon: '❤️', color: 'bg-pink-50 text-pink-600' },
        { label: 'Likes donnés', value: stats.likesGiven, icon: '💖', color: 'bg-red-50 text-red-600' },
        { label: 'Messages envoyés', value: stats.messagesSent, icon: '💬', color: 'bg-[var(--primary)]/5 text-[var(--primary)]' },
        { label: 'Notifications non lues', value: stats.unreadNotifications, icon: '🔔', color: 'bg-yellow-50 text-yellow-600' },
        { label: 'Membre depuis', value: stats.daysActive + ' jours', icon: '📅', color: 'bg-green-50 text-green-600' },
      ];
      return (
        <div className="max-w-xl mx-auto p-4 page-slide">
          <h1 className="text-xl font-bold text-gray-800 mb-4">📊 Mes Statistiques</h1>
          <div className="grid grid-cols-2 gap-3 mb-4">
            {cards.map(c => (
              <div key={c.label} className={`rounded-xl p-4 ${c.color}`}>
                <p className="text-2xl mb-1">{c.icon}</p>
                <p className="text-2xl font-bold">{c.value}</p>
                <p className="text-xs opacity-75">{c.label}</p>
              </div>
            ))}
          </div>
          <button onClick={() => navigate('/compte')} className="w-full btn-primary py-2.5">Retour au compte</button>
        </div>
      );
    }

    // === APP ===
    function App() {
      const { user, loading } = useAuth();
      const { path, navigate } = useRoute();
      const [prevPage, setPrevPage] = useState('');
      const page = path.split('/')[1] || 'messages';
      useEffect(() => { if (page !== prevPage) setPrevPage(page); }, [page]);
      if (loading) return <div className="min-h-screen flex items-center justify-center text-gray-400">Chargement...</div>;
      if (!user) {
        if (path === '/inscription') return <Register navigate={navigate}/>;
        return <Login navigate={navigate}/>;
      }
      return (
        <div>
          <Navbar page={page} navigate={navigate}/>
          <div key={page} className="page-slide">
            {page==='messages'&&!path.split('/')[2]&&<Messages navigate={navigate}/>}
            {path.startsWith('/chat/')&&<Chat userId={path.split('/')[2]} navigate={navigate}/>}
            {page==='stories'&&<Stories navigate={navigate}/>}
            {page==='recherche'&&<Search navigate={navigate}/>}
            {page==='explorer'&&<Explorer navigate={navigate}/>}
            {page==='amis'&&<Friends navigate={navigate}/>}
            {page==='likes'&&<LikesReceived navigate={navigate}/>}
            {page==='sondages'&&<Polls navigate={navigate}/>}
            {page==='bloques'&&<BlockedList navigate={navigate}/>}
            {page==='stats'&&<Stats navigate={navigate}/>}
            {page==='compte'&&<Account/>}
            {path.startsWith('/profil/')&&<Profile userId={path.split('/')[2]} navigate={navigate}/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ThemeProvider><AuthProvider><App/></AuthProvider></ThemeProvider>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        console.log('TeenLink PWA activé !');
      }).catch(function(err) {
        console.log('Service worker non disponible:', err);
      });
    }
  </script>
</body>
</html>
